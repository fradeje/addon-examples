<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contractor Invoice Generator</title>
    <link rel="stylesheet" href="/style.css" />
</head>

<body>
    <div class="wrap">
        <div class="card">
            <h2>Contractor Invoice Generator</h2>
            <p>MVP: generate a monthly invoice from <b>approved</b> + <b>billable</b> Clockify time.</p>

            <div class="tabs">
                <button class="tab active" data-tab="invoice">Invoice</button>
                <button class="tab" data-tab="settings">Settings</button>
            </div>

            <div id="tab-invoice" class="tab-panel active">
                <div class="row">
                    <div>
                        <label for="month">Invoice month</label>
                        <input id="month" type="month" />
                    </div>
                    <div>
                        <label for="format">Output</label>
                        <select id="format">
                            <option value="preview">Preview (JSON)</option>
                            <option value="pdf">PDF</option>
                        </select>
                    </div>
                </div>
                <button id="btn" style="margin-top:14px;">Generate preview</button>

                <div class="hint">
                    Status: <span id="status" class="bad">Not connected yet</span><br />
                    Next: we’ll call Clockify Reports API and compute totals.
                </div>

                <pre id="dbg">(debug)</pre>
            </div>

            <div id="tab-settings" class="tab-panel">
                <!-- Freelancer profile (editable) -->
                <div class="card" style="max-width:none; padding:14px; margin-top:14px;">
                    <h3 style="margin:0 0 8px;">Your invoice details</h3>
                    <p class="muted">This information will appear as <b>Bill From</b> on your invoice.</p>

                    <label>Name / Business name</label>
                    <input id="v_name" placeholder="e.g., John Doe Consulting LLC" />

                    <label>Tax ID (NIF/VAT/CIF)</label>
                    <input id="v_taxId" placeholder="e.g., ESX1234567" />

                    <label>Address</label>
                    <input id="v_address" placeholder="Street, City, ZIP, Country" />

                    <label>Email</label>
                    <input id="v_email" placeholder="you@email.com" />

                    <label>Payment details</label>
                    <textarea id="v_paymentDetails" rows="4"
                        placeholder="IBAN: ...&#10;BIC/SWIFT: ...&#10;Account number: ...&#10;PayPal/Wise: ..."></textarea>

                    <div class="row">
                        <div>
                            <label>Hourly rate</label>
                            <input id="v_rate" type="number" step="0.01" placeholder="e.g., 28.85" />
                        </div>
                        <div>
                            <label>Currency</label>
                            <input id="v_currency" placeholder="USD" />
                        </div>
                    </div>
                    <div class="row">
                        <div>
                            <label for="v_invoicePrefix">Invoice prefix</label>
                            <input id="v_invoicePrefix" placeholder="INV" />
                        </div>

                        <div>
                            <label for="v_startCount">Start count (only first time)</label>
                            <input id="v_startCount" type="number" min="1" step="1" placeholder="e.g., 1" />
                        </div>
                    </div>

                    <label for="v_nextInvoiceNumber">Next invoice number</label>
                    <input id="v_nextInvoiceNumber" class="readonly-input" type="text" readonly
                        title="You cannot edit this. It updates automatically after you generate a PDF." />

                    <label>IRPF % (optional)</label>
                    <input id="v_irpfPercent" type="number" step="0.01" placeholder="e.g., 15" />

                    <button id="saveProfile" style="margin-top:12px;">Save my info</button>
                    <div class="hint" id="saveStatus"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/sidebar.js"></script>
</body>

</html>
